<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Shenron</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&display=swap" rel="stylesheet">

<style>

html,body{
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:#000;
}

/* =========================
   OLD INTRO (UNCHANGED)
========================= */

#intro{
    position:fixed;
    inset:0;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#000;
    z-index:10;
}

#message{
    text-align:center;
}

#fullscreenText{
    font-family:'Cinzel',serif;
    font-size:32px;
    color:#C0C0C0;
    line-height:1.5;
    margin-bottom:40px;
}

.clickable{
    display:inline-block;

    font-family:'Cinzel',serif;
    font-size:30px;
    font-weight:700;

    color:#D4AF37;

    cursor:pointer;
    user-select:none;

    transition:
        color .3s ease,
        transform .3s ease,
        text-shadow .3s ease,
        opacity .5s ease;
}

.clickable:hover{
    color:#F4D35E;
    transform:translateY(-3px);
    text-shadow:
        0 0 10px rgba(212,175,55,.8),
        0 0 22px rgba(212,175,55,.45);
}

#readySection{
    display:none;
}

/* =========================
   VIDEO
========================= */

video{
    position:fixed;
    inset:0;
    width:100vw;
    height:100vh;
    object-fit:cover;
    display:none;
}

/* =========================
   CENTERED + BIG CONTINUE
========================= */

#continue{
    position:fixed;
    left:50%;
    top:50%;

    transform:translate(-50%, -50%) scale(0.95);

    display:none;
    opacity:0;

    padding:24px 60px;

    font-family:'Cinzel',serif;
    font-size:28px;
    font-weight:700;
    letter-spacing:1.5px;

    color:#D4AF37;

    border:2px solid #D4AF37;
    background:rgba(0,0,0,.6);

    cursor:pointer;

    text-align:center;

    transition:
        opacity .8s ease,
        transform .8s ease,
        background .3s ease,
        color .3s ease,
        box-shadow .3s ease;
}

#continue:hover{
    color:#FFE082;
    border-color:#FFE082;
    background:rgba(30,20,0,.85);

    box-shadow:
        0 0 25px rgba(212,175,55,.8),
        0 0 60px rgba(212,175,55,.35);

    transform:translate(-50%, -50%) scale(1.05);
}

</style>

</head>

<body>

<!-- INTRO (YOUR ORIGINAL) -->
<div id="intro">

<div id="message">

<div id="fullscreenText">
For the best experience,<br>
view in fullscreen.
</div>

<div id="enterFullscreen" class="clickable">
Enter Fullscreen →
</div>

<div id="readySection">

<div id="fullscreenText" style="margin-bottom:25px;">
Perfect.
</div>

<div id="ready" class="clickable">
I'm Ready. →
</div>

</div>

</div>

</div>

<!-- VIDEO -->
<video id="video" muted playsinline>
    <source src="COME%20FORTH,%20SHENRON!.mp4" type="video/mp4">
</video>

<!-- CONTINUE (NOW CENTERED + BIG) -->
<button id="continue">
I Wish to Know Your Beliefs
</button>

<script>

const intro=document.getElementById("intro");
const enter=document.getElementById("enterFullscreen");
const readySection=document.getElementById("readySection");
const ready=document.getElementById("ready");
const video=document.getElementById("video");
const button=document.getElementById("continue");

let pausedForWish=false;

video.controls=false;

/* FULLSCREEN */
enter.onclick=async()=>{

    try{
        if(document.documentElement.requestFullscreen){
            await document.documentElement.requestFullscreen();
        }
    }catch(e){}

    enter.style.display="none";
    readySection.style.display="block";
};

/* START VIDEO */
ready.onclick=()=>{

    intro.style.display="none";
    video.style.display="block";
    video.play().catch(()=>{});

};

/* PAUSE AT 15s */
video.ontimeupdate=()=>{

    if(!pausedForWish && video.currentTime>=15){

        pausedForWish=true;
        video.pause();

        button.style.display="block";

        requestAnimationFrame(()=>{

            button.style.opacity="1";
            button.style.transform="translate(-50%, -50%) scale(1)";

        });

    }

};

/* RESUME AT 20s */
button.onclick=()=>{

    button.style.display="none";

    video.currentTime=20;
    video.play().catch(()=>{});

};

/* REDIRECT */
video.onended=()=>{

window.location.href =
"https://sites.google.com/students.edu.sg/adrian-portfolio/beliefs?authuser=3&v=2";

};

</script>

</body>
</html>
