<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Shenron</title>

<link rel="canonical" href="https://sites.google.com/view/adrian-oss-portfolio/beliefs">

<style>

html,body{
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:#000;
}

/* ================= INTRO ================= */

#intro{
    position:fixed;
    inset:0;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#000;
    z-index:10;
}

#message{
    text-align:center;
}

.fullscreenText{
    font-family:'Cinzel',serif;
    font-size:32px;
    color:#C0C0C0;
    line-height:1.5;
    margin-bottom:40px;
    transition:opacity .4s ease;
}

.clickable{
    display:inline-block;

    font-family:'Cinzel',serif;
    font-size:30px;
    font-weight:700;

    color:#D4AF37;

    cursor:pointer;
    user-select:none;

    transition:
        color .3s ease,
        transform .3s ease,
        text-shadow .3s ease,
        opacity .5s ease;
}

.clickable:hover{
    color:#F4D35E;
    transform:translateY(-3px);
    text-shadow:
        0 0 10px rgba(212,175,55,.8),
        0 0 22px rgba(212,175,55,.45);
}

#readySection{
    display:none;
}

/* ================= VIDEO ================= */

video{
    position:fixed;
    inset:0;
    width:100vw;
    height:100vh;
    object-fit:cover;
    display:none;
}

/* ================= WISH BUTTON ================= */

#continue{
    position:fixed;
    left:50%;
    top:50%;

    transform:translate(-50%, -50%) scale(0.95);

    display:none;
    opacity:0;

    padding:24px 60px;

    font-family:'Cinzel',serif;
    font-size:28px;
    font-weight:700;

    color:#D4AF37;
    border:2px solid #D4AF37;
    background:rgba(0,0,0,.6);

    cursor:pointer;

    text-align:center;

    animation: glow 2.2s ease-in-out infinite;

    transition:
        opacity .8s ease,
        transform .8s ease,
        background .3s ease,
        color .3s ease,
        box-shadow .3s ease;
}

#continue:hover{
    color:#FFE082;
    border-color:#FFE082;
    background:rgba(30,20,0,.85);

    box-shadow:
        0 0 25px rgba(212,175,55,.8),
        0 0 60px rgba(212,175,55,.35);

    transform:translate(-50%, -50%) scale(1.05);
}

@keyframes glow{
    0%,100%{ box-shadow:0 0 10px rgba(212,175,55,.2); }
    50%{ box-shadow:0 0 25px rgba(212,175,55,.5); }
}

</style>

</head>

<body>

<!-- INTRO -->
<div id="intro">

<div id="message">

<div class="fullscreenText" id="introText">
For the best experience,<br>
view in fullscreen.
</div>

<div id="enterFullscreen" class="clickable">
Enter Fullscreen →
</div>

<div id="readySection">

<div id="ready" class="clickable">
I'm Ready. →
</div>

</div>

</div>

</div>

<!-- VIDEO -->
<video id="video" muted playsinline>
    <source src="COME%20FORTH,%20SHENRON!.mp4" type="video/mp4">
</video>

<!-- WISH BUTTON -->
<button id="continue">
I Want to Know Adrian's Beliefs!
</button>

<script>

const intro=document.getElementById("intro");
const enter=document.getElementById("enterFullscreen");
const readySection=document.getElementById("readySection");
const ready=document.getElementById("ready");
const video=document.getElementById("video");
const button=document.getElementById("continue");
const introText=document.getElementById("introText");

let pausedForWish=false;

video.controls=false;

/* FULLSCREEN + PERFECT */
enter.onclick=async()=>{

    try{
        if(document.documentElement.requestFullscreen){
            await document.documentElement.requestFullscreen();
        }
    }catch(e){}

    enter.style.display="none";

    introText.style.opacity="0";

    setTimeout(()=>{
        introText.innerHTML="Perfect.";
        introText.style.opacity="1";
    },300);

    readySection.style.display="block";
};

/* START VIDEO */
ready.onclick=()=>{

    intro.style.display="none";
    video.style.display="block";
    video.play().catch(()=>{});

};

/* PAUSE AT 15s */
video.ontimeupdate=()=>{

    if(!pausedForWish && video.currentTime>=15){

        pausedForWish=true;
        video.pause();

        button.style.display="block";

        requestAnimationFrame(()=>{

            button.style.opacity="1";
            button.style.transform="translate(-50%, -50%) scale(1)";

        });

    }

};

/* RESUME AT 20s */
button.onclick=()=>{

    button.style.display="none";

    video.currentTime=20;
    video.play().catch(()=>{});

};

/* FINAL ANIME END TRANSITION */
video.onended = () => {

    const aura = document.createElement("div");
    aura.style.position = "fixed";
    aura.style.inset = "0";
    aura.style.background = "radial-gradient(circle, rgba(0,255,120,0.25), transparent 60%)";
    aura.style.zIndex = "999";
    aura.style.pointerEvents = "none";
    aura.style.opacity = "0";
    aura.style.transition = "opacity 0.6s ease";

    document.body.appendChild(aura);

    document.body.style.transition =
        "transform 0.2s ease, opacity 1.8s ease, filter 1.8s ease";

    let shakeCount = 0;

    const shake = setInterval(() => {

        const x = (Math.random() - 0.5) * 10;
        const y = (Math.random() - 0.5) * 10;

        document.body.style.transform = `translate(${x}px, ${y}px)`;

        shakeCount++;

        if (shakeCount > 8) {

            clearInterval(shake);

            document.body.style.transform = "translate(0,0)";

            aura.style.opacity = "1";

            document.body.style.opacity = "0";
            document.body.style.filter = "blur(8px) brightness(0)";

            setTimeout(() => {
                aura.style.opacity = "0";
            }, 800);

            setTimeout(() => {
                window.location.href =
                "https://sites.google.com/view/adrian-oss-portfolio/beliefs";
            }, 1600);
        }

    }, 60);
};

</script>

</body>
</html>
