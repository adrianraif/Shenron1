<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Shenron</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&display=swap" rel="stylesheet">

<style>

html,
body{
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:#000;
}

video{
    position:fixed;
    top:0;
    left:0;
    width:100vw;
    height:100vh;
    object-fit:cover;
}

#continue{
    position:fixed;
    bottom:45px;
    left:50%;
    transform:translateX(-50%);

    display:none;
    opacity:0;

    padding:15px 45px;

    font-family:'Cinzel', serif;
    font-weight:700;
    font-size:24px;
    letter-spacing:2px;

    color:#C0C0C0;

    background:rgba(0,0,0,.55);
    border:2px solid #C0C0C0;

    cursor:pointer;

    transition:
        opacity 1.8s ease,
        transform .3s ease,
        background .3s ease,
        color .3s ease,
        box-shadow .3s ease;
}

#continue:hover{
    background:#C0C0C0;
    color:#000;
    box-shadow:0 0 18px rgba(192,192,192,.75);
    transform:translateX(-50%) scale(1.05);
}

</style>

</head>

<body>

<video
    id="video"
    autoplay
    muted
    playsinline
    disablepictureinpicture
>
    <source src="COME%20FORTH,%20SHENRON!.mp4" type="video/mp4">
</video>

<button id="continue">
    Continue
</button>

<script>

const video = document.getElementById("video");
const button = document.getElementById("continue");

video.controls = false;

video.onended = () => {

    button.style.display = "block";

    setTimeout(() => {
        button.style.opacity = "1";
    }, 100);

};

button.onclick = () => {

    window.location.href = "https://sites.google.com/students.edu.sg/adrian-portfolio/beliefs?v=2";

};

</script>

</body>
</html>
