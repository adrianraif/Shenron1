<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Shenron</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&display=swap" rel="stylesheet">

<style>

html,body{
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:#000;
}

video{
    position:fixed;
    inset:0;
    width:100vw;
    height:100vh;
    object-fit:cover;
}

/* ========================= */
/* WISH BUTTON */
/* ========================= */

#wish{
    position:fixed;
    left:50%;
    bottom:55px;

    transform:translateX(-50%) translateY(15px);

    display:none;
    opacity:0;

    padding:18px 42px;

    font-family:'Cinzel',serif;
    font-size:22px;
    font-weight:700;
    letter-spacing:1px;

    color:#D4AF37;

    border:2px solid #D4AF37;
    background:rgba(0,0,0,.55);

    cursor:pointer;

    white-space:nowrap;

    transition:
        opacity .8s ease,
        transform .8s ease,
        color .3s ease,
        background .3s ease,
        box-shadow .3s ease;
}

#wish:hover{

    color:#FFE082;
    border-color:#FFE082;
    background:rgba(30,20,0,.8);

    box-shadow:
        0 0 15px rgba(212,175,55,.8),
        0 0 35px rgba(212,175,55,.35);

}

/* ========================= */
/* CONTINUE BUTTON */
/* ========================= */

#continue{

    position:fixed;
    left:50%;
    bottom:45px;

    transform:translateX(-50%) translateY(15px);

    display:none;
    opacity:0;

    padding:16px 40px;

    font-family:'Cinzel',serif;
    font-weight:700;
    font-size:20px;
    letter-spacing:1.5px;

    color:#C0C0C0;

    border:2px solid #C0C0C0;
    background:rgba(0,0,0,.55);

    cursor:pointer;

    transition:
        opacity 1.2s ease,
        transform 1.2s ease,
        background .3s ease,
        color .3s ease,
        box-shadow .3s ease;

}

#continue:hover{

    background:#C0C0C0;
    color:black;

    box-shadow:0 0 18px rgba(192,192,192,.7);

}

</style>

</head>

<body>

<video
id="video"
autoplay
muted
playsinline
disablepictureinpicture>

<source src="COME%20FORTH,%20SHENRON!.mp4" type="video/mp4">

</video>

<button id="wish">
I Want to Know Adrian's Beliefs!
</button>

<button id="continue">
Continue →
</button>

<script>

const video=document.getElementById("video");
const wish=document.getElementById("wish");
const button=document.getElementById("continue");

video.controls=false;

let paused=false;

/* Pause at 15 seconds */

video.addEventListener("timeupdate",()=>{

    if(!paused && video.currentTime>=15){

        paused=true;

        video.pause();

        wish.style.display="block";

        requestAnimationFrame(()=>{

            wish.style.opacity="1";
            wish.style.transform="translateX(-50%) translateY(0)";

        });

    }

});

/* Resume at 20 seconds */

wish.onclick=()=>{

    wish.style.display="none";

    video.currentTime=20;

    video.play();

}

/* Show continue after video */

video.onended=()=>{

    button.style.display="block";

    requestAnimationFrame(()=>{

        button.style.opacity="1";
        button.style.transform="translateX(-50%) translateY(0)";

    });

}

/* Continue */

button.onclick=()=>{

window.location.href="https://sites.google.com/students.edu.sg/adrian-portfolio/beliefs?authuser=3&v=2";

}

</script>

</body>
</html>
